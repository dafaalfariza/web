<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ApayCoding</title>

    <!-- CSS -->
     <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/navbar.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Exo+2&display=swap" rel="stylesheet">
</head>
<style>
    @import url('https://fonts.googleapi.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap');


* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Jost", serif;
    min-height: 100vh;
    background: url(../images/dark-background-web.png);
    background-attachment: fixed;
    background-repeat: no-repeat;
    background-size: cover;
}

.navbar {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 80px;
    width: 100%;
    position: sticky;
    top: 0;
    background: transparent;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(10px);
    z-index: 999;
}

.navbar-container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 0 2rem;
    max-width: 1600px;
}

.navbar-logo {
    font-size: 2rem;
    font-weight: 600;
    color: #fff;
    text-decoration: none;
    cursor: pointer;
}

.navbar-logo img {
    height: 70px;
    width: auto;
}

.navbar-container .navbar-menu {
    display: flex;
    text-align: center;
    gap: 1.5rem;
    list-style: none;
}

.navbar-container .navbar-menu li a {
    text-decoration: none;
    color:  #fff;
    font-size: 1.3rem;
    font-weight: 500;
    padding: 3px 20px;
    border-radius: 20px;
    border: 2px solid transparent;
    transition: all 0.7 ease;
    white-space: nowrap;
}

.navbar-container .navbar-menu li a:hover,
.navbar-container .navbar-menu li a.active{
    color: #162530;
    background: rgba(188, 212, 229, 0.8);
    border: 2px solid #fff;
}

.navbar-toggle {
    display: none;
    background: transparent;
    padding: 10px;
    border: none;
    cursor: pointer;
}

.bar {
    display: block;
    width: 25px;
    height: 3px;
    margin: 5px auto;
    background: #fff;
    transition: all 0.3 ease-in-out;
}

/* Dropdown Styling (Sesuaikan Tema Navbar) */
.navbar-menu .dropdown {
    position: relative;
}

.navbar-menu .dropdown-menu {
    position: absolute;
    top: 100%;
    left: 0;
    background: rgba(22, 37, 48, 0.8); /* warna gelap semi transparan */
    backdrop-filter: blur(10px); /* efek blur seperti navbar */
    border: 2px solid #ffffff44;
    border-radius: 12px;
    min-width: 200px;
    list-style: none;
    display: none;
    flex-direction: column;
    padding: 0.5rem 0;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
    z-index: 999;
}

.navbar-menu .dropdown-menu li a {
    padding: 10px 20px;
    display: block;
    font-size: 1rem;
    color: #fff;
    text-align: left;
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.3s ease;
}

.navbar-menu .dropdown:hover .dropdown-menu {
    display: flex;
}

.navbar-menu .dropdown-menu li a:hover {
    background: rgba(188, 212, 229, 0.2);
    color: #fff;
}
.dropdown-menu.show {
    display: flex !important;
}

/* ===================== */
/* Tablet & Mobile View  */
/* ===================== */
@media (max-width: 880px) {
    .navbar-container .navbar-menu {
        display: none;
        flex-direction: column;
        align-items: flex-start;
        gap: 1.7rem !important;
        position: absolute;
        height: 100vh;
        width: 250px;
        top: 0;
        right: 0;
        padding: 5rem 1.5rem;
        background: rgba(0, 0, 0, 0.75);
        box-shadow: -5px 0 10px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(10px);
        z-index: 99;
    }

    .navbar-container .navbar-menu.active {
        display: flex;
    }

    .navbar-toggle {
        display: block;
        z-index: 999;
    }

    .navbar-toggle.active .bar:nth-child(2) {
        opacity: 0;
    }

    .navbar-toggle.active .bar:nth-child(1) {
        transform: translateY(8px) rotate(45deg);
    }

    .navbar-toggle.active .bar:nth-child(3) {
        transform: translateY(-8px) rotate(-45deg);
    }

    /* Dropdown Mobile */
    .navbar-menu .dropdown {
        position: relative;
    }

    .navbar-menu .dropdown-toggle::after {
        content: " ▼";
        font-size: 0.7em;
        padding-left: 5px;
    }

    .navbar-menu .dropdown-menu {
        position: sticky;
        top: 100%;
        left: 0;
        width: max-content;
        min-width: 180px;
        display: none;
        flex-direction: column;
        background: rgba(22, 37, 48, 0.9);
        backdrop-filter: blur(10px);
        border-radius: 10px;
        box-shadow: 0 8px 15px rgba(0, 0, 0, 0.5);
        padding: 0.5rem 0;
        z-index: 1000;
    }

    .navbar-menu .dropdown.open .dropdown-menu {
        display: flex;
    }

    .navbar-menu .dropdown-menu li a {
        padding: 10px 20px;
        font-size: 1rem;
        color: white;
        white-space: nowrap;
        text-decoration: none;
    }

    .navbar-menu .dropdown-menu li a:hover {
        background: rgba(255, 255, 255, 0.1);
    }
}

/* ================= */
/* Small Mobile View */
/* ================= */
@media (max-width: 420px) {
    .navbar-container {
        padding: 0 1rem;
    }

    .navbar-logo {
        font-size: 1.7rem;
    }

    .navbar-container .navbar-menu li a {
        font-size: 1.2rem;
        padding: 3px 15px;
    }

    .navbar-menu .dropdown-menu li a {
        font-size: 0.95rem;
        padding: 7px 15px;
    }
}

</style>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="../index.html" class="navbar-logo"><img src="../images/apaycoding_logo.png" alt="ApayCoding"></a>
            <button class="navbar-toggle">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <ul class="navbar-menu">
                <li><a href="../index.html">Home</a></li>
                <li><a href="#">About</a></li>
                <li class="dropdown">
                    <a href="#" class="active">Materi</a>
                    <ul class="dropdown-menu">
                        <li><a href="kj.html">KJ</a></li>
                        <li><a href="tjkn.html">TJKN</a></li>
                        <li><a href="#">UI/UX Design</a></li>
                    </ul>
                </li>

                <li><a href="#">Blog</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>
    </nav>

<h1 class="neon-title">Keamanan Jaringan</h1>
<div class="full-box">

</div>
<script>
    // Toggle navbar menu (sudah ada)
const navbarToggle = document.querySelector('.navbar-toggle');
const navbarMenu = document.querySelector('.navbar-menu');

navbarToggle.addEventListener('click', () => {
    navbarToggle.classList.toggle('active');
    navbarMenu.classList.toggle('active');
});

// Toggle dropdown untuk mobile
document.querySelectorAll('.dropdown-toggle').forEach(toggle => {
    toggle.addEventListener('click', (e) => {
        const parent = toggle.parentElement;
        if (window.innerWidth <= 880) {
            e.preventDefault();
            parent.classList.toggle('open');

            // Tutup dropdown lain jika dibuka
            document.querySelectorAll('.dropdown').forEach(drop => {
                if (drop !== parent) {
                    drop.classList.remove('open');
                }
            });
        }
    });
});

</script>
</body>

</html>
